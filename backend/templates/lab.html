<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 20px;
    }

    .header h1 {
      font-size: 12px;
      font-weight: 600;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .left-panel {
      width: 400px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      overflow: hidden;
    }

    .video-container {
      width: 100%;
      padding: 12px;
      background: #0a0a0a;
      border-bottom: 1px solid #333;
    }

    .video-container iframe {
      width: 100%;
      height: 200px;
      border: 1px solid #333;
      background: #000;
    }

    .learning-plan {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0a0a0a;
    }

    .learning-plan-header {
      background: #1a1a1a;
      padding: 12px;
      border-bottom: 1px solid #333;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
    }

    .learning-plan-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .learning-step {
      border-bottom: 1px solid #333;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .learning-step:hover {
      background: #1a1a1a;
    }

    .learning-step.completed {
      background: #0a2a0a;
      border-left: 3px solid #0f0;
      padding-left: 9px;
    }

    .learning-step.active {
      background: #1a1a1a;
      border-left: 3px solid #fff;
      padding-left: 9px;
    }

    .step-number {
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .learning-step.completed .step-number {
      color: #0f0;
    }

    .step-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
      font-size: 11px;
    }

    .step-description {
      font-size: 10px;
      color: #aaa;
      line-height: 1.4;
      margin-bottom: 6px;
      display: none;
    }

    .learning-step.expanded .step-description {
      display: block;
    }

    .step-command {
      background: #1a1a1a;
      padding: 6px 8px;
      border-left: 2px solid #555;
      font-size: 10px;
      color: #0f0;
      margin-top: 6px;
      border-radius: 2px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      display: none;
      overflow-x: auto;
    }

    .learning-step.expanded .step-command {
      display: block;
    }

    .step-status {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
      font-style: italic;
    }

    .learning-step.completed .step-status {
      color: #0f0;
    }

    .terminal-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .environment-setup {
      background: #0a1a0a;
      border-bottom: 1px solid #333;
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
      border-left: 3px solid #0f0;
    }

    .environment-setup-title {
      font-size: 11px;
      font-weight: 600;
      color: #0f0;
      margin-bottom: 6px;
    }

    .environment-setup-content {
      font-size: 10px;
      color: #aaa;
      line-height: 1.5;
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 11px;
      line-height: 1.4;
      border-bottom: 1px solid #333;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #0a0a0a;
    }

    .terminal-output.empty {
      color: #555;
    }

    .output-line {
      margin: 2px 0;
    }

    .command-prefix {
      color: #888;
      margin-right: 4px;
    }

    .success {
      color: #0f0;
    }

    .error {
      color: #f00;
    }

    .terminal-input {
      display: flex;
      border-top: 1px solid #333;
      padding: 8px;
      gap: 8px;
      background: #0a0a0a;
    }

    input[type="text"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      padding: 6px 8px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 11px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #666;
    }

    button {
      background: #fff;
      color: #000;
      border: 1px solid #fff;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
    }

    button:hover {
      background: #ddd;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #askBtn {
      min-width: 60px;
    }

    .qa-section {
      padding: 12px;
      border-top: 1px solid #333;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      max-height: 220px;
      overflow: hidden;
    }

    .qa-input {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .qa-input input {
      flex: 1;
      font-size: 11px;
    }

    .qa-header {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
    }

    .qa-history {
      flex: 1;
      overflow-y: auto;
      font-size: 10px;
    }

    .qa-item {
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
    }

    .qa-question {
      color: #aaa;
      margin-bottom: 2px;
    }

    .qa-answer {
      color: #888;
      font-size: 8px;
    }

    .loading {
      color: #666;
      font-style: italic;
    }

    .spinner {
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 1px solid #666;
      border-top: 1px solid transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 4px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lab: <span id="labId"></span> — Follow the steps to learn hands-on</h1>
  </div>

  <div class="main-container">
    <div class="left-panel">
      <div class="video-container">
        <iframe id="videoEmbed" allowfullscreen="" style="display: none;"></iframe>
        <div id="videoPlaceholder" style="width: 100%; height: 200px; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px;">No video</div>
      </div>

      <div class="learning-plan">
        <div class="learning-plan-header">📋 Learning Steps</div>
        <div class="learning-plan-content" id="learningPlan">
          <div class="learning-step">
            <div class="loading"><span class="spinner"></span>Generating plan...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="terminal-section">
      <div class="environment-setup">
        <div class="environment-setup-title">🔧 Environment Setup</div>
        <div class="environment-setup-content" id="environmentSetup">
          <div class="loading"><span class="spinner"></span>Loading environment info...</div>
        </div>
      </div>

      <div class="terminal-output empty" id="terminalOutput">
        <div class="loading"><span class="spinner"></span>Initializing environment...</div>
      </div>

      <div class="terminal-input">
        <input type="text" id="commandInput" placeholder="$ " autocomplete="off">
        <button id="executeBtn">Execute</button>
      </div>

      <div class="qa-section">
        <div class="qa-header">💬 Q&A - Ask to understand better</div>
        <div class="qa-input">
          <input type="text" id="questionInput" placeholder="Ask a question...">
          <button id="askBtn">Ask</button>
        </div>
        <div class="qa-history" id="qaHistory"></div>
      </div>
    </div>
  </div>

  <script>
    const LAB_ID = new URLSearchParams(window.location.search).get('lab');
    let learningPlan = null;
    let parsedSteps = [];
    let completedSteps = new Set();
    let currentStepIndex = 0;

    document.getElementById('labId').textContent = LAB_ID ? LAB_ID.substring(0, 12) : 'Unknown';

    // Initialize
    async function init() {
      try {
        const response = await fetch(`/api/lab/${LAB_ID}`);
        if (!response.ok) throw new Error('Failed to fetch lab data');

        const data = await response.json();
        learningPlan = data.learning_plan;

        // Display environment setup info
        displayEnvironmentSetup(data);

        // Embed YouTube video if video_id is provided
        if (data.video_id) {
          const videoEmbed = document.getElementById('videoEmbed');
          const videoPlaceholder = document.getElementById('videoPlaceholder');
          videoEmbed.src = `https://www.youtube.com/embed/${data.video_id}`;
          videoEmbed.style.display = 'block';
          videoPlaceholder.style.display = 'none';
        }

        displayLearningPlan(learningPlan);
        appendOutput('Lab environment initialized. Follow the steps on the left or type a command below.');
      } catch (error) {
        appendOutput(`Error initializing lab: ${error.message}`, 'error');
      }
    }

    function displayEnvironmentSetup(data) {
      const setupEl = document.getElementById('environmentSetup');
      const description = data.environment_description || 'Environment configured and ready.';

      setupEl.innerHTML = `
        <div style="color: #fff; font-size: 10px; line-height: 1.6;">
          ${escapeHtml(description).replace(/\n/g, '<br>')}
        </div>
      `;
    }

    function parseStep(stepText) {
      // Parse a single step from text format
      const titleMatch = stepText.match(/\*\*(.+?)\*\*:\s*(.*)/);
      if (!titleMatch) return null;

      const title = titleMatch[1];
      let description = titleMatch[2];
      let command = null;

      // Extract command from backticks
      const cmdMatch = stepText.match(/`([^`]+)`/);
      if (cmdMatch) {
        command = cmdMatch[1];
      }

      return { title, description, command };
    }

    function addStepToDisplay(stepText, stepIndex) {
      const container = document.getElementById('learningPlan');
      const step = parseStep(stepText);

      if (!step) return;

      // Mark previous step as complete if exists
      if (stepIndex > 0) {
        const prevSteps = document.querySelectorAll('.learning-step');
        if (prevSteps.length > 0) {
          prevSteps[prevSteps.length - 1].classList.remove('active', 'expanded');
          prevSteps[prevSteps.length - 1].classList.add('completed');
          const statusEl = prevSteps[prevSteps.length - 1].querySelector('.step-status');
          if (statusEl) statusEl.textContent = '✓ Complete';
        }
      }

      // Create new step element
      const stepEl = document.createElement('div');
      stepEl.className = 'learning-step active expanded';
      stepEl.innerHTML = `
        <div class="step-number">Step ${stepIndex + 1}</div>
        <div class="step-title">${escapeHtml(step.title)}</div>
        <div class="step-description">${escapeHtml(step.description)}</div>
        ${step.command ? `<div class="step-command">$ ${escapeHtml(step.command)}</div>` : ''}
        <div class="step-status">→ Your turn</div>
      `;

      container.appendChild(stepEl);
      stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      currentStepIndex++;
    }

    function displayLearningPlan(plan) {
      const container = document.getElementById('learningPlan');
      if (!plan) {
        container.innerHTML = '<div class="learning-step"><div class="learning-step-desc">No plan available</div></div>';
        return;
      }

      // Parse and display initial step only
      const step = parseStep(plan);
      if (!step) return;

      container.innerHTML = `
        <div class="learning-step active expanded">
          <div class="step-number">Step 1</div>
          <div class="step-title">${escapeHtml(step.title)}</div>
          <div class="step-description">${escapeHtml(step.description)}</div>
          ${step.command ? `<div class="step-command">$ ${escapeHtml(step.command)}</div>` : ''}
          <div class="step-status">→ Your turn</div>
        </div>
      `;

      currentStepIndex = 1;
    }


    function appendOutput(text, type = 'normal') {
      const output = document.getElementById('terminalOutput');

      if (output.classList.contains('empty')) {
        output.classList.remove('empty');
        output.innerHTML = '';
      }

      const line = document.createElement('div');
      line.className = 'output-line';

      if (type === 'command') {
        line.innerHTML = `<span class="command-prefix">$</span>${escapeHtml(text)}`;
      } else if (type === 'error') {
        line.innerHTML = `<span class="error">${escapeHtml(text)}</span>`;
      } else if (type === 'success') {
        line.innerHTML = `<span class="success">${escapeHtml(text)}</span>`;
      } else {
        line.textContent = text;
      }

      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('executeBtn').addEventListener('click', async () => {
      const input = document.getElementById('commandInput');
      const command = input.value.trim();

      if (!command) return;

      appendOutput(command, 'command');
      input.value = '';

      document.getElementById('executeBtn').disabled = true;
      document.getElementById('commandInput').disabled = true;

      try {
        const response = await fetch(`/api/lab/${LAB_ID}/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command })
        });

        const data = await response.json();

        if (data.output) {
          data.output.split('\n').forEach(line => {
            if (line.trim()) appendOutput(line);
          });
        }

        if (data.error) {
          appendOutput(`Error: ${data.error}`, 'error');
        } else {
          appendOutput('✓ Command executed', 'success');
        }

        // If we got a next step from the AI, display it dynamically
        if (data.next_step) {
          appendOutput('', 'normal'); // blank line
          appendOutput('📝 Next step coming up...', 'success');
          setTimeout(() => {
            addStepToDisplay(data.next_step, currentStepIndex);
          }, 500);
        }
      } catch (error) {
        appendOutput(`Execution error: ${error.message}`, 'error');
      } finally {
        document.getElementById('executeBtn').disabled = false;
        document.getElementById('commandInput').disabled = false;
        document.getElementById('commandInput').focus();
      }
    });

    document.getElementById('commandInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('executeBtn').click();
      }
    });

    document.getElementById('askBtn').addEventListener('click', async () => {
      const input = document.getElementById('questionInput');
      const question = input.value.trim();

      if (!question) return;

      const history = document.getElementById('qaHistory');
      const item = document.createElement('div');
      item.className = 'qa-item';
      item.innerHTML = `<div class="qa-question">Q: ${escapeHtml(question)}</div><div class="qa-answer"><span class="spinner"></span>Thinking...</div>`;
      history.appendChild(item);
      history.scrollTop = history.scrollHeight;

      input.value = '';
      document.getElementById('askBtn').disabled = true;

      try {
        const response = await fetch(`/api/lab/${LAB_ID}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await response.json();

        item.innerHTML = `
          <div class="qa-question">Q: ${escapeHtml(question)}</div>
          <div class="qa-answer">A: ${escapeHtml(data.answer || data.error || 'No response')}</div>
        `;
      } catch (error) {
        item.innerHTML = `
          <div class="qa-question">Q: ${escapeHtml(question)}</div>
          <div class="qa-answer error">Error: ${escapeHtml(error.message)}</div>
        `;
      } finally {
        document.getElementById('askBtn').disabled = false;
        document.getElementById('questionInput').focus();
      }
    });

    document.getElementById('questionInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('askBtn').click();
      }
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
