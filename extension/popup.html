<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #000;
    }

    button {
      padding: 12px;
      background: #000;
      color: #fff;
      border: 1px solid #000;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: #333;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      font-size: 11px;
      padding: 10px;
      border: 1px solid #000;
      line-height: 1.4;
      max-height: 150px;
      overflow-y: auto;
    }

    .error {
      background: #000;
      color: #fff;
    }

    .success {
      background: #fff;
      color: #000;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 11px;
    }

    .spinner {
      width: 10px;
      height: 10px;
      border: 1px solid #000;
      border-top: 1px solid transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">you are ngmi if not hands on</div>

    <div id="error" class="message error" style="display: none;"></div>
    <div id="success" class="message success" style="display: none;"></div>

    <div style="margin-bottom: 12px;">
      <label style="font-size: 11px; font-weight: 500; display: block; margin-bottom: 4px;">Project context (optional)</label>
      <textarea id="projectContext" placeholder="e.g., I'm learning Docker for my DevOps project..." style="width: 100%; padding: 8px; border: 1px solid #000; font-size: 11px; font-family: monospace; resize: vertical; min-height: 60px;"></textarea>
    </div>

    <button id="handsOnButton">Go Hands On</button>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <span id="loadingText">Extracting transcript...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
